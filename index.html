<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMind Lite | Dashboard</title>
    <style>
    :root {
        --bg: #0a0a0f;
        --bg-card: #12121a;
        --primary: #00ff88;
        --secondary: #00ccff;
        --green: #00ff88;
        --red: #ff4757;
        --text: #e0e0e0;
        --dim: #666;
        --border: #1a1a2e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'SF Mono','Fira Code','Courier New',monospace; background:var(--bg); color:var(--text); }
    .app { max-width:1400px; margin:0 auto; padding:16px; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); margin-bottom:20px; }
    .header h1 { font-size:1.4em; background:linear-gradient(90deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header .status { display:flex; align-items:center; gap:8px; font-size:0.85em; color:var(--dim); }
    .header .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .grid { display:grid; gap:16px; }
    .grid-top { grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); }
    .grid-main { grid-template-columns:2fr 1fr; }
    @media(max-width:900px) { .grid-main { grid-template-columns:1fr; } }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:16px; }
    .card h3 { color:var(--secondary); font-size:0.9em; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    .price-card { text-align:center; cursor:pointer; transition:border-color 0.3s; }
    .price-card:hover { border-color:var(--primary); }
    .price-card .symbol { font-size:1.1em; font-weight:bold; margin-bottom:4px; }
    .price-card .price { font-size:1.5em; font-weight:bold; margin:8px 0; }
    .price-card .change { font-size:0.9em; padding:2px 8px; border-radius:4px; }
    .up { color:var(--green); } .down { color:var(--red); }
    .change.up { background:rgba(0,255,136,0.1); } .change.down { background:rgba(255,71,87,0.1); }
    table { width:100%; border-collapse:collapse; font-size:0.85em; }
    th { text-align:left; color:var(--dim); padding:8px 4px; border-bottom:1px solid var(--border); font-weight:normal; }
    td { padding:8px 4px; border-bottom:1px solid rgba(255,255,255,0.03); }
    .gauge { text-align:center; padding:20px 0; }
    .gauge-value { font-size:3em; font-weight:bold; }
    .gauge-label { font-size:1.1em; margin-top:8px; }
    .gauge-bar { width:100%; height:8px; background:linear-gradient(90deg,var(--red),#ff9f43,#feca57,var(--green)); border-radius:4px; margin-top:16px; position:relative; }
    .gauge-marker { position:absolute; top:-4px; width:16px; height:16px; background:white; border-radius:50%; transform:translateX(-50%); box-shadow:0 0 8px rgba(255,255,255,0.5); transition:left 1s ease; }
    .pnl-total { font-size:1.3em; font-weight:bold; margin-bottom:12px; }
    .portfolio-empty { color:var(--dim); text-align:center; padding:30px; }
    .portfolio-empty code { display:block; margin-top:10px; color:var(--primary); font-size:0.9em; }
    .loading { color:var(--dim); text-align:center; padding:20px; }
    .spin { display:inline-block; animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .footer { text-align:center; padding:20px; color:var(--dim); font-size:0.8em; margin-top:20px; border-top:1px solid var(--border); }
    .footer a { color:var(--primary); text-decoration:none; }
    .tabs { display:flex; gap:0; margin-bottom:16px; }
    .tab { padding:8px 16px; border:1px solid var(--border); background:none; color:var(--dim); cursor:pointer; font-family:inherit; font-size:0.85em; transition:all 0.2s; }
    .tab:first-child { border-radius:4px 0 0 4px; }
    .tab:last-child { border-radius:0 4px 4px 0; }
    .tab.active { background:var(--primary); color:var(--bg); border-color:var(--primary); }
    .alert-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
    .alert-item:last-child { border-bottom:none; }
    .badge { font-size:0.75em; padding:2px 6px; border-radius:3px; }
    .badge-active { background:rgba(0,204,255,0.15); color:var(--secondary); }
    .badge-triggered { background:rgba(0,255,136,0.15); color:var(--green); }
    .form-row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
    .form-row input, .form-row select { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:0.85em; }
    .form-row input { flex:1; min-width:0; }
    .form-row select { min-width:80px; }
    .btn { background:var(--primary); color:var(--bg); border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:0.85em; font-weight:bold; white-space:nowrap; }
    .btn:hover { opacity:0.85; }
    .btn-danger { background:var(--red); color:white; padding:3px 8px; font-size:0.75em; }
    .msg { padding:6px 10px; border-radius:4px; font-size:0.85em; margin-bottom:8px; }
    .msg-ok { background:rgba(0,255,136,0.1); color:var(--green); }
    .msg-err { background:rgba(255,71,87,0.1); color:var(--red); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>AlphaMind Lite</h1>
        <div class="status"><span class="dot"></span> <span id="status-text">Connecting...</span></div>
    </div>

    <div class="grid grid-top" id="price-cards">
        <div class="card price-card loading"><span class="spin">&#x21bb;</span> Loading...</div>
    </div>

    <div style="height:16px"></div>

    <div class="grid grid-main">
        <div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab(this,'market-tab')">Market</button>
                <button class="tab" onclick="switchTab(this,'portfolio-tab')">Portfolio</button>
                <button class="tab" onclick="switchTab(this,'alerts-tab')">Alerts</button>
            </div>
            <div class="card" id="market-tab">
                <h3>Market Overview</h3>
                <table>
                    <thead><tr><th>Symbol</th><th>Price</th><th>24h Change</th><th>24h High</th><th>24h Low</th><th>Volume</th></tr></thead>
                    <tbody id="market-table"><tr><td colspan="6" class="loading"><span class="spin">&#x21bb;</span></td></tr></tbody>
                </table>
            </div>
            <div class="card" id="portfolio-tab" style="display:none">
                <h3>Portfolio</h3>
                <div id="portfolio-msg"></div>
                <div class="form-row">
                    <input id="pf-symbol" placeholder="Symbol (BTC)" maxlength="10">
                    <input id="pf-amount" placeholder="Amount" type="number" step="any" min="0">
                    <input id="pf-price" placeholder="Avg Price" type="number" step="any" min="0">
                    <button class="btn" onclick="addHolding()">Add</button>
                </div>
                <div id="portfolio-content" class="portfolio-empty">Loading...</div>
            </div>
            <div class="card" id="alerts-tab" style="display:none">
                <h3>Price Alerts</h3>
                <div id="alerts-msg"></div>
                <div class="form-row">
                    <input id="al-symbol" placeholder="Symbol (BTC)" maxlength="10">
                    <input id="al-price" placeholder="Price" type="number" step="any" min="0">
                    <select id="al-dir"><option value="above">Above</option><option value="below">Below</option></select>
                    <button class="btn" onclick="addAlertUI()">Add</button>
                </div>
                <div id="alerts-content">Loading...</div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>Fear &amp; Greed Index</h3>
                <div class="gauge" id="sentiment-gauge"><div class="loading"><span class="spin">&#x21bb;</span></div></div>
            </div>
            <div style="height:16px"></div>
            <div class="card">
                <h3>Funding Rates</h3>
                <div id="funding-content" class="loading"><span class="spin">&#x21bb;</span></div>
            </div>
        </div>
    </div>

    <div class="footer">AlphaMind Lite v9.2 | <a href="https://github.com/ailin546/alphamind-lite" target="_blank">GitHub</a> | Data from Binance</div>
</div>

<script>
const API = window.location.origin;
const SYMBOLS = ['BTC','ETH','BNB','SOL','XRP','ADA','DOGE','AVAX'];
function fmt(n,d=2){return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error('API '+r.status);return r.json()}

let _marketCache=null;
async function fetchAllMarkets(){
    _marketCache=await Promise.all(SYMBOLS.map(s=>api('/api/market?symbol='+s+'USDT').catch(()=>null)));
    return _marketCache;
}

function renderPriceCards(data){
    const c=document.getElementById('price-cards');
    const top=['BTC','ETH','BNB','SOL'];
    const cards=data.filter(d=>d&&top.includes(d.symbol.replace('USDT','')));
    if(cards.length===0){c.innerHTML='<div class="card">Failed to load</div>';return}
    const parts=[];
    for(const d of cards){const s=d.symbol.replace('USDT',''),p=parseFloat(d.lastPrice),ch=parseFloat(d.priceChangePercent),dir=ch>=0?'up':'down',sign=ch>=0?'+':'';
    parts.push(`<div class="card price-card"><div class="symbol">${s}</div><div class="price ${dir}">$${fmt(p)}</div><span class="change ${dir}">${sign}${ch.toFixed(2)}%</span></div>`)}
    c.innerHTML=parts.join('');
}

function renderMarketTable(data){
    const tb=document.getElementById('market-table');
    const rows=[];
    for(const d of data){if(!d)continue;const s=d.symbol.replace('USDT',''),p=parseFloat(d.lastPrice),ch=parseFloat(d.priceChangePercent),hi=parseFloat(d.highPrice),lo=parseFloat(d.lowPrice),v=parseFloat(d.quoteVolume),dir=ch>=0?'up':'down',sign=ch>=0?'+':'';
    rows.push(`<tr><td><strong>${s}</strong></td><td>$${fmt(p)}</td><td class="${dir}">${sign}${ch.toFixed(2)}%</td><td>$${fmt(hi)}</td><td>$${fmt(lo)}</td><td>$${(v/1e6).toFixed(1)}M</td></tr>`)}
    tb.innerHTML=rows.length?rows.join(''):'<tr><td colspan="6">Failed</td></tr>';
}

async function loadMarket(){
    try{const data=await fetchAllMarkets();renderPriceCards(data);renderMarketTable(data)}catch{
    document.getElementById('price-cards').innerHTML='<div class="card">Failed to load</div>';
    document.getElementById('market-table').innerHTML='<tr><td colspan="6">Failed</td></tr>'}
}

async function loadSentiment(){
    const g=document.getElementById('sentiment-gauge');
    try{const d=await api('/api/sentiment');const v=parseInt(d.data[0].value),l=d.data[0].value_classification;
    let c=v<25?'var(--red)':v<45?'#ff9f43':v<55?'#feca57':'var(--green)';
    g.innerHTML=`<div class="gauge-value" style="color:${c}">${v}</div><div class="gauge-label">${l}</div><div class="gauge-bar"><div class="gauge-marker" style="left:${v}%"></div></div>`}catch{g.innerHTML='<div style="color:var(--dim)">Unable to load</div>'}
}

async function loadPortfolio(){
    const c=document.getElementById('portfolio-content');
    try{const d=await api('/api/portfolio');
    if(!d.holdings||d.holdings.length===0){c.innerHTML='<div class="portfolio-empty">No holdings yet<code>node portfolio.js add BTC 0.5 68000</code></div>';return}
    const sign=d.totalPnl>=0?'+':'',dir=d.totalPnl>=0?'up':'down';
    let h=`<div class="pnl-total ${dir}">$${fmt(d.totalValue)} <span style="font-size:0.7em">(${sign}${d.totalPnlPercent.toFixed(2)}%)</span></div>`;
    h+='<table><thead><tr><th>Symbol</th><th>Amount</th><th>Avg Price</th><th>Current</th><th>Value</th><th>P&L</th><th></th></tr></thead><tbody>';
    for(const x of d.holdings){const hd=x.pnl>=0?'up':'down',hs=x.pnl>=0?'+':'';
    h+=`<tr><td><strong>${x.symbol}</strong></td><td>${x.amount.toFixed(4)}</td><td>$${fmt(x.avgPrice)}</td><td>$${fmt(x.currentPrice)}</td><td>$${fmt(x.value)}</td><td class="${hd}">${hs}$${fmt(x.pnl)} (${hs}${x.pnlPercent.toFixed(1)}%)</td><td><button class="btn btn-danger" onclick="removeHoldingUI('${x.symbol}')">×</button></td></tr>`}
    h+='</tbody></table>';c.innerHTML=h}catch{c.innerHTML='<div class="portfolio-empty">Use the form above to add holdings</div>'}
}

async function loadAlerts(){
    const c=document.getElementById('alerts-content');
    try{const d=await api('/api/alerts');
    if(!d.alerts||d.alerts.length===0){c.innerHTML='<div style="color:var(--dim);padding:10px 0">No alerts<br><code style="color:var(--primary)">node alerts.js add BTC 80000 above</code></div>';return}
    let h='';for(const a of d.alerts){const dir=a.direction==='above'?'⬆':'⬇',b=a.triggered?'<span class="badge badge-triggered">Triggered</span>':'<span class="badge badge-active">Active</span>';
    h+=`<div class="alert-item"><span>${a.symbol} ${dir} $${a.price.toLocaleString()}</span><span>${b} <button class="btn btn-danger" onclick="removeAlertUI('${a.id}')" style="margin-left:6px">×</button></span></div>`}c.innerHTML=h}catch{c.innerHTML='<div style="color:var(--dim)">Unable to load</div>'}
}

async function loadFunding(){
    const c=document.getElementById('funding-content');
    try{const d=await api('/api/funding');
    if(!d.rates||d.rates.length===0){c.innerHTML='<div style="color:var(--dim)">No data</div>';return}
    let h='<table><thead><tr><th>Pair</th><th>Rate</th><th>APY</th></tr></thead><tbody>';
    for(const r of d.rates.slice(0,8)){const dir=r.rate>=0?'up':'down',sign=r.rate>=0?'+':'';
    h+=`<tr><td>${r.symbol.replace('USDT','')}</td><td class="${dir}">${sign}${(r.rate*100).toFixed(4)}%</td><td class="${dir}">${sign}${r.apy.toFixed(1)}%</td></tr>`}
    h+='</tbody></table>';c.innerHTML=h}catch{c.innerHTML='<div style="color:var(--dim)">Unable to load</div>'}
}

function switchTab(btn,id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
    ['market-tab','portfolio-tab','alerts-tab'].forEach(i=>{document.getElementById(i).style.display=i===id?'block':'none'})
}

function connectSSE(){
    try{const es=new EventSource(API+'/api/stream');
    es.onopen=()=>{document.getElementById('status-text').textContent='Live'};
    es.onerror=()=>{document.getElementById('status-text').textContent='Reconnecting...'};
    es.addEventListener('prices',e=>{try{const prices=JSON.parse(e.data);
    const cards=document.querySelectorAll('.price-card');
    cards.forEach(card=>{const sym=card.querySelector('.symbol')?.textContent;const p=prices.find(x=>x.symbol===sym);
    if(p){const dir=p.change>=0?'up':'down',sign=p.change>=0?'+':'';
    card.querySelector('.price').className='price '+dir;card.querySelector('.price').textContent='$'+fmt(p.price);
    card.querySelector('.change').className='change '+dir;card.querySelector('.change').textContent=sign+p.change.toFixed(2)+'%'}})}catch{}})}catch{}
}

function showMsg(elId,text,ok){const el=document.getElementById(elId);el.innerHTML=`<div class="msg ${ok?'msg-ok':'msg-err'}">${text}</div>`;setTimeout(()=>{el.innerHTML=''},3000)}

async function postAPI(path,body){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Failed');return d}

async function addHolding(){
    const sym=document.getElementById('pf-symbol').value.trim().toUpperCase();
    const amt=parseFloat(document.getElementById('pf-amount').value);
    const price=parseFloat(document.getElementById('pf-price').value);
    if(!sym){showMsg('portfolio-msg','Please enter a symbol',false);return}
    if(isNaN(amt)||amt<=0){showMsg('portfolio-msg','Invalid amount',false);return}
    if(isNaN(price)||price<=0){showMsg('portfolio-msg','Invalid price',false);return}
    try{await postAPI('/api/portfolio/add',{symbol:sym,amount:amt,avgPrice:price});showMsg('portfolio-msg',`Added ${sym}`,true);document.getElementById('pf-symbol').value='';document.getElementById('pf-amount').value='';document.getElementById('pf-price').value='';loadPortfolio()}catch(e){showMsg('portfolio-msg',e.message,false)}
}

async function removeHoldingUI(sym){
    if(!confirm(`Remove ${sym}?`))return;
    try{await postAPI('/api/portfolio/remove',{symbol:sym});showMsg('portfolio-msg',`Removed ${sym}`,true);loadPortfolio()}catch(e){showMsg('portfolio-msg',e.message,false)}
}

async function addAlertUI(){
    const sym=document.getElementById('al-symbol').value.trim().toUpperCase();
    const price=parseFloat(document.getElementById('al-price').value);
    const dir=document.getElementById('al-dir').value;
    if(!sym){showMsg('alerts-msg','Please enter a symbol',false);return}
    if(isNaN(price)||price<=0){showMsg('alerts-msg','Invalid price',false);return}
    try{await postAPI('/api/alerts/add',{symbol:sym,price,direction:dir});showMsg('alerts-msg',`Alert added for ${sym}`,true);document.getElementById('al-symbol').value='';document.getElementById('al-price').value='';loadAlerts()}catch(e){showMsg('alerts-msg',e.message,false)}
}

async function removeAlertUI(id){
    try{await postAPI('/api/alerts/remove',{id});loadAlerts()}catch(e){showMsg('alerts-msg',e.message,false)}
}

async function init(){
    await Promise.all([loadMarket(),loadSentiment(),loadPortfolio(),loadAlerts(),loadFunding()]);
    document.getElementById('status-text').textContent='Live';
    connectSSE();
    setInterval(()=>{loadMarket();loadPortfolio()},30000);
    setInterval(loadSentiment,300000);
}
init();
</script>
</body>
</html>
