name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DOCKER_IMAGE: alphamind-lite

jobs:
  # ---- Lint & Validate ----
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          for file in scripts/*.js config/*.js; do
            node -c "$file" && echo "  ✓ $file" || exit 1
          done
          echo "All files valid"

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "sk-[a-zA-Z0-9]" --include="*.js" .; then
            echo "::error::Potential API key found in source code!"
            exit 1
          fi
          echo "No secrets found"

  # ---- Test ----
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci || echo "No dependencies to install (zero-dependency project)"

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  # ---- Docker Build ----
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:test .
          docker run --rm -d -p 3000:3000 --name test-container ${{ env.DOCKER_IMAGE }}:test
          sleep 5
          curl -f http://localhost:3000/health || exit 1
          docker stop test-container

  # ---- Deploy to Production ----
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "🚀 Deploying to production..."

      # Add your deployment steps here:
      # - SSH to server and docker-compose pull/up
      # - Or deploy to cloud platform (AWS ECS, GCP Cloud Run, etc.)
      # - Or trigger webhook
