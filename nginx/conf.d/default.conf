# AlphaMind Lite - Server Block Configuration

server {
    listen 80;
    server_name _;

    # Connection limits
    limit_conn addr 100;

    # Client body limits
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Health check (no logging, no rate limit)
    location /health {
        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Readiness check
    location /ready {
        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Prometheus metrics (restrict access in production)
    location /metrics {
        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        # In production, restrict to monitoring IPs:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Caching for market data (short TTL)
        proxy_cache_valid 200 10s;
    }

    # Static files with caching
    location ~* \.(html|css|js|png|jpg|ico|svg)$ {
        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Default - rate limited
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://alphamind_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ /(config|logs|\.env|\.git) {
        deny all;
        return 404;
    }
}
